[build]
  publish = "landing"
  command = "echo 'Static landing page - no build needed'"
  ignore = "exit 0"

[build.environment]
  NODE_VERSION = "18"

# Disable all plugins - this is a static HTML site only
[[plugins]]

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
