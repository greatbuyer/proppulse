name: Data Pipeline Refresh
on:
  schedule:
    # Runs every Sunday at 6 AM UTC (midnight CST)
    - cron: '0 6 * * 0'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Run Residential + Commercial Pipeline
        run: |
          echo "🚀 Starting data pipeline refresh..."
          RESPONSE=$(curl -sf --max-time 120 \
            "${{ secrets.SITE_URL }}/api/pipeline?secret=${{ secrets.API_SECRET }}&phase=all")
          echo "$RESPONSE" | jq .
          SUCCESS=$(echo "$RESPONSE" | jq -r '.success')
          if [ "$SUCCESS" != "true" ]; then
            echo "❌ Pipeline failed!"
            exit 1
          fi
          echo "✅ Pipeline completed successfully"

      - name: Run Cleanup
        run: |
          echo "🗑️ Running data cleanup..."
          RESPONSE=$(curl -sf --max-time 60 \
            "${{ secrets.SITE_URL }}/api/pipeline/cleanup?secret=${{ secrets.API_SECRET }}")
          echo "$RESPONSE" | jq .
          echo "✅ Cleanup done"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Data pipeline refresh failed! Check the logs above."
